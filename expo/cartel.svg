<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 594 420" width="594" height="420" role="img" aria-label="Cartel A2 · Domingo González de Lena · arte paleolítico asturiano en piedra">
  <title>Cartel A2 · Domingo González de Lena</title>
  <desc>Cartel A2 (594×420 mm) para la exposición en La Esquina del Peso, Oviedo.</desc>

  <!-- Fondo papel -->
  <rect width="100%" height="100%" fill="#FAFAF7"/>

  <!-- Borde sutil -->
  <rect x="20" y="20" width="554" height="380" fill="none" stroke="#E5E5E0" stroke-width="1"/>

  <!-- Kicker -->
  <text x="297" y="58" text-anchor="middle" font-family="Inter, sans-serif" font-weight="600" font-size="11" fill="#D4845A" letter-spacing="3.5">EXPOSICIÓN</text>

  <!-- Título -->
  <text x="297" y="100" text-anchor="middle" font-family="Inter, sans-serif" font-weight="800" font-size="34" fill="#2D6A4F" letter-spacing="-0.8">DOMINGO GONZÁLEZ DE LENA</text>

  <!-- Subtítulo -->
  <text x="297" y="128" text-anchor="middle" font-family="Inter, sans-serif" font-weight="500" font-size="16" fill="#1B1B1B" letter-spacing="-0.2">Arte paleolítico asturiano en piedra</text>

  <!-- Línea separadora coral -->
  <line x1="260" y1="146" x2="334" y2="146" stroke="#D4845A" stroke-width="2"/>

  <!-- Cierva esquemática centrada -->
  <g transform="translate(167,170)" stroke="#2D6A4F" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 50 60 C 100 38, 180 35, 240 50 L 256 58 L 262 48"/>
    <path d="M 50 60 L 35 42 L 26 28 L 22 22"/>
    <path d="M 24 24 L 18 10"/>
    <path d="M 22 22 L 13 28"/>
    <path d="M 58 68 L 58 116"/>
    <path d="M 76 64 L 76 112"/>
    <path d="M 215 64 L 218 116"/>
    <path d="M 240 60 L 246 112"/>
    <path d="M 76 86 L 215 86"/>
  </g>

  <!-- Información del lugar -->
  <text x="297" y="318" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="15" fill="#1B1B1B">La Esquina del Peso · Calle del Peso 1 · Oviedo</text>

  <!-- Fechas -->
  <text x="297" y="344" text-anchor="middle" font-family="Inter, sans-serif" font-weight="500" font-size="13" fill="#3D3D3D">Del [fecha inicio] al [fecha fin]</text>
  <text x="297" y="364" text-anchor="middle" font-family="Inter, sans-serif" font-weight="500" font-size="13" fill="#3D3D3D">Inauguración: [día] a las [hora]</text>

  <!-- Pie -->
  <text x="297" y="395" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#999" letter-spacing="1.4">24 PIEZAS · SIETE CUEVAS ASTURIANAS + VENUS DEL CUERNO</text>
</svg>
