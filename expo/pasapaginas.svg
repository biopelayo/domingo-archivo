<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 200" width="50" height="200" role="img" aria-label="Pasapáginas · Domingo González de Lena">
  <title>Pasapáginas · marcador de libros</title>
  <desc>Marcador de libros 50×200 mm para regalar en la exposición.</desc>

  <rect width="100%" height="100%" fill="#FAFAF7"/>
  <rect x="2" y="2" width="46" height="196" fill="none" stroke="#E5E5E0" stroke-width="0.5"/>

  <!-- Agujero para cordón -->
  <circle cx="25" cy="10" r="2" fill="none" stroke="#999" stroke-width="0.4"/>

  <!-- Cierva en miniatura -->
  <g transform="translate(7,22) scale(0.135)" stroke="#2D6A4F" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 50 60 C 100 38, 180 35, 240 50 L 256 58 L 262 48"/>
    <path d="M 50 60 L 35 42 L 26 28 L 22 22"/>
    <path d="M 24 24 L 18 10"/>
    <path d="M 22 22 L 13 28"/>
    <path d="M 58 68 L 58 116"/>
    <path d="M 76 64 L 76 112"/>
    <path d="M 215 64 L 218 116"/>
    <path d="M 240 60 L 246 112"/>
    <path d="M 76 86 L 215 86"/>
  </g>

  <line x1="15" y1="62" x2="35" y2="62" stroke="#D4845A" stroke-width="0.6"/>

  <text x="25" y="76" text-anchor="middle" font-family="Inter, sans-serif" font-weight="800" font-size="3.6" fill="#2D6A4F">DOMINGO</text>
  <text x="25" y="82" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="2.6" fill="#2D6A4F">GONZÁLEZ DE LENA</text>
  <text x="25" y="90" text-anchor="middle" font-family="Inter, sans-serif" font-weight="500" font-size="2.4" fill="#1B1B1B">Arte paleolítico</text>
  <text x="25" y="94" text-anchor="middle" font-family="Inter, sans-serif" font-weight="500" font-size="2.4" fill="#1B1B1B">asturiano en piedra</text>

  <line x1="15" y1="102" x2="35" y2="102" stroke="#E5E5E0" stroke-width="0.4"/>

  <text x="25" y="114" text-anchor="middle" font-family="Inter, sans-serif" font-weight="500" font-size="2.2" fill="#3D3D3D">Pindal · Tito Bustillo</text>
  <text x="25" y="118" text-anchor="middle" font-family="Inter, sans-serif" font-weight="500" font-size="2.2" fill="#3D3D3D">Les Pedroses · Buxu</text>
  <text x="25" y="122" text-anchor="middle" font-family="Inter, sans-serif" font-weight="500" font-size="2.2" fill="#3D3D3D">Llonín · Lluera · Candamo</text>
  <text x="25" y="128" text-anchor="middle" font-family="Inter, sans-serif" font-weight="600" font-size="2.2" fill="#D4845A">+ Venus del cuerno</text>

  <line x1="15" y1="138" x2="35" y2="138" stroke="#E5E5E0" stroke-width="0.4"/>

  <text x="25" y="150" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="2.6" fill="#1B1B1B">La Esquina del Peso</text>
  <text x="25" y="155" text-anchor="middle" font-family="Inter, sans-serif" font-size="2.2" fill="#3D3D3D">Calle del Peso 1 · Oviedo</text>

  <text x="25" y="166" text-anchor="middle" font-family="Inter, sans-serif" font-weight="600" font-size="2.4" fill="#2D6A4F">[fecha inicio] - [fecha fin]</text>

  <text x="25" y="190" text-anchor="middle" font-family="Inter, sans-serif" font-size="1.6" fill="#999" letter-spacing="0.4">24 PIEZAS · @pelamovic</text>
</svg>
