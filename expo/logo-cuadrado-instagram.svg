<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080" role="img" aria-label="Logo cuadrado Instagram · Domingo González de Lena">
  <title>Logo cuadrado Instagram</title>
  <desc>Versión cuadrada 1080×1080 para feed de Instagram.</desc>

  <rect width="100%" height="100%" fill="#FAFAF7"/>
  <rect x="60" y="60" width="960" height="960" fill="none" stroke="#E5E5E0" stroke-width="2"/>

  <!-- Kicker arriba -->
  <text x="540" y="180" text-anchor="middle" font-family="Inter, sans-serif" font-weight="600" font-size="22" fill="#D4845A" letter-spacing="6">EXPOSICIÓN · ARTE PALEOLÍTICO</text>

  <!-- Cierva grande centrada -->
  <g transform="translate(280,300) scale(2.0)" stroke="#2D6A4F" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 50 60 C 100 38, 180 35, 240 50 L 256 58 L 262 48"/>
    <path d="M 50 60 L 35 42 L 26 28 L 22 22"/>
    <path d="M 24 24 L 18 10"/>
    <path d="M 22 22 L 13 28"/>
    <path d="M 58 68 L 58 116"/>
    <path d="M 76 64 L 76 112"/>
    <path d="M 215 64 L 218 116"/>
    <path d="M 240 60 L 246 112"/>
    <path d="M 76 86 L 215 86"/>
  </g>

  <!-- Línea separadora -->
  <line x1="440" y1="700" x2="640" y2="700" stroke="#D4845A" stroke-width="3"/>

  <!-- Título -->
  <text x="540" y="790" text-anchor="middle" font-family="Inter, sans-serif" font-weight="800" font-size="56" fill="#2D6A4F" letter-spacing="-1.2">DOMINGO</text>
  <text x="540" y="846" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="34" fill="#1B1B1B" letter-spacing="-0.4">González de Lena</text>

  <!-- Subtítulo / pie -->
  <text x="540" y="920" text-anchor="middle" font-family="Inter, sans-serif" font-weight="500" font-size="20" fill="#3D3D3D">Arte paleolítico asturiano en piedra</text>
  <text x="540" y="965" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" fill="#767676">La Esquina del Peso · Calle del Peso 1 · Oviedo</text>
</svg>
