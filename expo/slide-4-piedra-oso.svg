  <rect width="100%" height="100%" fill="#FAFAF7"/>
  <rect x="40" y="40" width="1000" height="1000" fill="none" stroke="#E5E5E0" stroke-width="2"/>

  <text x="540" y="135" text-anchor="middle" font-family="Inter, sans-serif" font-weight="600" font-size="20" fill="#D4845A" letter-spacing="5">PIEZA #5 · TITO BUSTILLO</text>

  <text x="540" y="225" text-anchor="middle" font-family="Inter, sans-serif" font-weight="800" font-size="64" fill="#2D6A4F" letter-spacing="-1.5">Piedra</text>
