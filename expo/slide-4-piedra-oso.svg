    <!-- Orejas -->
    <path d="M 38 95 L 32 70"/>
    <path d="M 55 92 L 60 68"/>
    <!-- Hocico -->
    <path d="M 25 150 L 10 155 L 20 165"/>
    <!-- Patas anchas -->
    <path d="M 90 150 L 80 220 L 110 220 L 110 150"/>
    <path d="M 170 152 L 165 222 L 195 222 L 195 152"/>
    <path d="M 260 155 L 255 222 L 285 222 L 285 155"/>
    <path d="M 350 152 L 345 218 L 375 218 L 375 152"/>
