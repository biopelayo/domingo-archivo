  <text x="540" y="775" text-anchor="middle" font-family="Inter, sans-serif" font-weight="500" font-size="22" fill="#3D3D3D">La pieza grabada más grande</text>
  <text x="540" y="810" text-anchor="middle" font-family="Inter, sans-serif" font-weight="500" font-size="22" fill="#3D3D3D">de la exposición: 60 × 30 cm.</text>

  <text x="540" y="880" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="22" fill="#2D6A4F">Cueva de Tito Bustillo</text>
  <text x="540" y="912" text-anchor="middle" font-family="Inter, sans-serif" font-weight="500" font-size="20" fill="#1B1B1B">Ribadesella · Patrimonio UNESCO</text>

  <text x="540" y="965" text-anchor="middle" font-family="Inter, sans-serif" font-style="italic" font-size="18" fill="#767676">Una de las imágenes más conocidas de la cueva.</text>

  <text x="110" y="995" font-family="Inter, sans-serif" font-size="18" fill="#767676">← 3/7</text>
