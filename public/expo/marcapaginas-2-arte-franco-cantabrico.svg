<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 200" width="50" height="200" role="img" aria-label="Marcapáginas 2 · Arte franco-cantábrico">
  <title>Marcapáginas · Arte franco-cantábrico</title>
  <desc>Marcapáginas de la exposición: tradición artística paleolítica del suroeste de Francia y la cornisa cantábrica.</desc>

  <rect width="100%" height="100%" fill="#FAFAF7"/>
  <rect x="2" y="2" width="46" height="196" fill="none" stroke="#E5E5E0" stroke-width="0.5"/>

  <circle cx="25" cy="10" r="2" fill="none" stroke="#999" stroke-width="0.4"/>

  <text x="25" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-weight="600" font-size="2.2" fill="#D4845A" letter-spacing="1.4">PALEOLÍTICO SUPERIOR</text>

  <!-- Silueta de bisonte esquemático (estilo Altamira) -->
  <g transform="translate(8,28)" stroke="#2D6A4F" stroke-width="0.9" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Cuerpo y giba característica -->
    <path d="M 4 14 C 6 8 14 6 20 8 L 26 6 L 30 8 C 33 12 33 16 31 19 L 30 22"/>
    <!-- Cabeza -->
    <path d="M 4 14 L 2 18 L 4 24"/>
    <!-- Cuernos -->
    <path d="M 5 16 L 1 13"/>
    <!-- Patas -->
    <path d="M 8 22 L 8 30"/>
    <path d="M 13 22 L 13 30"/>
    <path d="M 23 22 L 23 30"/>
    <path d="M 28 22 L 28 30"/>
  </g>

  <text x="25" y="60" text-anchor="middle" font-family="Inter, sans-serif" font-weight="800" font-size="3.4" fill="#2D6A4F">ARTE FRANCO-</text>
  <text x="25" y="65" text-anchor="middle" font-family="Inter, sans-serif" font-weight="800" font-size="3.4" fill="#2D6A4F">CANTÁBRICO</text>

  <line x1="18" y1="71" x2="32" y2="71" stroke="#D4845A" stroke-width="0.5"/>

  <text x="25" y="79" text-anchor="middle" font-family="Inter, sans-serif" font-size="2.3" fill="#3D3D3D">Tradición artística paleolítica</text>
  <text x="25" y="83" text-anchor="middle" font-family="Inter, sans-serif" font-size="2.3" fill="#3D3D3D">del suroeste de Francia y la</text>
  <text x="25" y="87" text-anchor="middle" font-family="Inter, sans-serif" font-size="2.3" fill="#3D3D3D">cornisa cantábrica española.</text>

  <text x="25" y="94" text-anchor="middle" font-family="Inter, sans-serif" font-size="2.3" fill="#3D3D3D">Periodos: Auriñaciense,</text>
  <text x="25" y="98" text-anchor="middle" font-family="Inter, sans-serif" font-size="2.3" fill="#3D3D3D">Gravetiense, Solutrense</text>
  <text x="25" y="102" text-anchor="middle" font-family="Inter, sans-serif" font-size="2.3" fill="#3D3D3D">y Magdaleniense.</text>

  <line x1="18" y1="108" x2="32" y2="108" stroke="#E5E5E0" stroke-width="0.4"/>

  <text x="25" y="116" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="2.4" fill="#2D6A4F">40.000-12.000 años AP</text>

  <line x1="18" y1="122" x2="32" y2="122" stroke="#E5E5E0" stroke-width="0.4"/>

  <text x="25" y="129" text-anchor="middle" font-family="Inter, sans-serif" font-weight="600" font-size="2.2" fill="#1B1B1B" letter-spacing="0.5">CUEVAS EMBLEMÁTICAS</text>

  <text x="25" y="136" text-anchor="middle" font-family="Inter, sans-serif" font-weight="600" font-size="2.1" fill="#3D3D3D">Francia</text>
  <text x="25" y="140" text-anchor="middle" font-family="Inter, sans-serif" font-size="2" fill="#3D3D3D">Lascaux · Chauvet · Niaux</text>

  <text x="25" y="148" text-anchor="middle" font-family="Inter, sans-serif" font-weight="600" font-size="2.1" fill="#3D3D3D">España</text>
  <text x="25" y="152" text-anchor="middle" font-family="Inter, sans-serif" font-size="2" fill="#3D3D3D">Altamira (Cantabria)</text>
  <text x="25" y="156" text-anchor="middle" font-family="Inter, sans-serif" font-size="2" fill="#3D3D3D">Tito Bustillo · Candamo</text>

  <line x1="18" y1="162" x2="32" y2="162" stroke="#E5E5E0" stroke-width="0.4"/>

  <text x="25" y="170" text-anchor="middle" font-family="Inter, sans-serif" font-style="italic" font-size="2" fill="#767676">Sitio UNESCO desde 1985:</text>
  <text x="25" y="174" text-anchor="middle" font-family="Inter, sans-serif" font-style="italic" font-size="2" fill="#767676">«Cueva de Altamira y arte</text>
  <text x="25" y="178" text-anchor="middle" font-family="Inter, sans-serif" font-style="italic" font-size="2" fill="#767676">rupestre paleolítico del</text>
  <text x="25" y="182" text-anchor="middle" font-family="Inter, sans-serif" font-style="italic" font-size="2" fill="#767676">norte de España».</text>

  <text x="25" y="190" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="2" fill="#2D6A4F">DOMINGO GONZÁLEZ DE LENA</text>
  <text x="25" y="194" text-anchor="middle" font-family="Inter, sans-serif" font-size="1.7" fill="#999" letter-spacing="0.3">paleotxomi.com · @txomidelena</text>
</svg>
