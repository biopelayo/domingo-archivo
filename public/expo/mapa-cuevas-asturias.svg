<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" role="img" aria-label="Mapa esquemático de Asturias con las siete cuevas de la exposición">
  <title>Recorrido por las siete cuevas asturianas</title>
  <desc>Mapa esquemático de Asturias con las siete cuevas representadas en la exposición, numeradas por orden geográfico oriente-occidente.</desc>

  <rect width="100%" height="100%" fill="#FAFAF7"/>
  <rect x="10" y="10" width="780" height="380" fill="none" stroke="#E5E5E0" stroke-width="1"/>

  <!-- Costa cantábrica simplificada -->
  <path
    d="M 50 65 Q 150 45 250 55 Q 350 50 450 60 Q 550 50 650 55 Q 720 48 780 60"
    stroke="#52B788"
    stroke-width="2"
    fill="none"
    stroke-linecap="round"
  />
  <text
    x="425" y="38"
    text-anchor="middle"
    font-family="Inter, sans-serif"
    font-weight="600"
    font-size="11"
    fill="#52B788"
    letter-spacing="2.4"
  >MAR CANTÁBRICO</text>

  <!-- Río Nalón (esquemático) -->
  <path
    d="M 285 50 Q 290 110 320 175 Q 340 240 370 320"
    stroke="#56B4E9"
    stroke-width="1.2"
    fill="none"
    stroke-dasharray="4,3"
    opacity="0.7"
  />
  <text x="338" y="180" font-family="Inter, sans-serif" font-size="9" fill="#56B4E9" font-style="italic">río Nalón</text>

  <!-- Rosa de vientos -->
  <g transform="translate(740,360)" stroke="#999" stroke-width="1" fill="none">
    <line x1="0" y1="0" x2="0" y2="-25"/>
    <path d="M -3 -22 L 0 -25 L 3 -22"/>
    <text x="0" y="-30" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#999" stroke="none">N</text>
  </g>

  <!-- Etiqueta inferior -->
  <text
    x="400" y="380"
    text-anchor="middle"
    font-family="Inter, sans-serif"
    font-size="10"
    fill="#767676"
    letter-spacing="1.6"
  >ASTURIAS · 7 CUEVAS + VENUS DEL CUERNO</text>

  <!-- 1 · Pindal (Ribadedeva, este extremo) -->
  <g>
    <circle cx="657" cy="164" r="12" fill="#2D6A4F"/>
    <text x="657" y="168" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="11" fill="#fff">1</text>
    <text x="657" y="194" text-anchor="middle" font-family="Inter, sans-serif" font-weight="600" font-size="10" fill="#1B1B1B">Pindal</text>
    <text x="657" y="206" text-anchor="middle" font-family="Inter, sans-serif" font-size="8.5" fill="#767676">UNESCO · Ribadedeva</text>
  </g>

  <!-- 2 · Tito Bustillo (Ribadesella) -->
  <g>
    <circle cx="510" cy="102" r="12" fill="#2D6A4F"/>
    <text x="510" y="106" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="11" fill="#fff">2</text>
    <text x="510" y="82" text-anchor="middle" font-family="Inter, sans-serif" font-weight="600" font-size="10" fill="#1B1B1B">Tito Bustillo</text>
    <text x="510" y="70" text-anchor="middle" font-family="Inter, sans-serif" font-size="8.5" fill="#767676">UNESCO · Ribadesella</text>
  </g>

  <!-- 3 · Les Pedroses (junto a Tito Bustillo) -->
  <g>
    <line x1="522" y1="102" x2="538" y2="102" stroke="#aaa" stroke-width="0.8"/>
    <circle cx="546" cy="102" r="9" fill="#95D5B2"/>
    <text x="546" y="106" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="10" fill="#2D6A4F">3</text>
    <text x="585" y="100" font-family="Inter, sans-serif" font-weight="500" font-size="9.5" fill="#1B1B1B">Les Pedroses</text>
    <text x="585" y="112" font-family="Inter, sans-serif" font-size="8" fill="#767676">Ribadesella</text>
  </g>

  <!-- 4 · Buxu (Cangas de Onís, interior) -->
  <g>
    <circle cx="506" cy="226" r="12" fill="#2D6A4F"/>
    <text x="506" y="230" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="11" fill="#fff">4</text>
    <text x="506" y="256" text-anchor="middle" font-family="Inter, sans-serif" font-weight="600" font-size="10" fill="#1B1B1B">Buxu</text>
    <text x="506" y="268" text-anchor="middle" font-family="Inter, sans-serif" font-size="8.5" fill="#767676">Cangas de Onís</text>
  </g>

  <!-- 5 · Llonín (Peñamellera Alta) -->
  <g>
    <circle cx="626" cy="268" r="12" fill="#2D6A4F"/>
    <text x="626" y="272" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="11" fill="#fff">5</text>
    <text x="626" y="298" text-anchor="middle" font-family="Inter, sans-serif" font-weight="600" font-size="10" fill="#1B1B1B">Llonín</text>
    <text x="626" y="310" text-anchor="middle" font-family="Inter, sans-serif" font-size="8.5" fill="#767676">UNESCO · Peñamellera</text>
  </g>

  <!-- 6 · Lluera (Oviedo, anfitriona) -->
  <g>
    <circle cx="266" cy="206" r="14" fill="#D4845A"/>
    <text x="266" y="211" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="12" fill="#fff">6</text>
    <text x="266" y="236" text-anchor="middle" font-family="Inter, sans-serif" font-weight="800" font-size="11" fill="#D4845A" letter-spacing="0.5">LLUERA</text>
    <text x="266" y="248" text-anchor="middle" font-family="Inter, sans-serif" font-size="8.5" fill="#767676">Oviedo · San Juan de Priorio</text>
    <text x="266" y="262" text-anchor="middle" font-family="Inter, sans-serif" font-style="italic" font-size="8.5" fill="#D4845A">cierva trilineal</text>
  </g>

  <!-- 7 · Candamo (occidente) -->
  <g>
    <circle cx="160" cy="125" r="12" fill="#2D6A4F"/>
    <text x="160" y="129" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="11" fill="#fff">7</text>
    <text x="160" y="155" text-anchor="middle" font-family="Inter, sans-serif" font-weight="600" font-size="10" fill="#1B1B1B">Candamo</text>
    <text x="160" y="167" text-anchor="middle" font-family="Inter, sans-serif" font-size="8.5" fill="#767676">UNESCO · Candamo</text>
  </g>

  <!-- Venus del cuerno · bonus pieza singular -->
  <g transform="translate(60,332)">
    <circle cx="0" cy="0" r="12" fill="#fff" stroke="#D4845A" stroke-width="2"/>
    <text x="0" y="4" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="11" fill="#D4845A">★</text>
    <text x="20" y="0" font-family="Inter, sans-serif" font-weight="600" font-size="10" fill="#1B1B1B">Venus del cuerno</text>
    <text x="20" y="12" font-family="Inter, sans-serif" font-size="8.5" fill="#767676">pieza singular del autor · fuera de cueva</text>
  </g>
</svg>
