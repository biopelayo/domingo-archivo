<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 200" width="50" height="200" role="img" aria-label="Marcapáginas 3 · Cierva trilineal de La Lluera">
  <title>Marcapáginas · Cierva trilineal de La Lluera</title>
  <desc>Marcapáginas de la exposición: la cierva trilineal del abrigo paleolítico de La Lluera (Oviedo).</desc>

  <rect width="100%" height="100%" fill="#FAFAF7"/>
  <rect x="2" y="2" width="46" height="196" fill="none" stroke="#E5E5E0" stroke-width="0.5"/>

  <circle cx="25" cy="10" r="2" fill="none" stroke="#999" stroke-width="0.4"/>

  <text x="25" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-weight="600" font-size="2.2" fill="#D4845A" letter-spacing="1.4">ABRIGO DE LA LLUERA</text>

  <!-- Cierva (mismo motivo del logo) -->
  <g transform="translate(7,32) scale(0.13)" stroke="#2D6A4F" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 50 60 C 100 38, 180 35, 240 50 L 256 58 L 262 48"/>
    <path d="M 50 60 L 35 42 L 26 28 L 22 22"/>
    <path d="M 24 24 L 18 10"/>
    <path d="M 22 22 L 13 28"/>
    <path d="M 58 68 L 58 116"/>
    <path d="M 76 64 L 76 112"/>
    <path d="M 215 64 L 218 116"/>
    <path d="M 240 60 L 246 112"/>
    <path d="M 76 86 L 215 86"/>
  </g>

  <!-- Tres líneas que dan nombre al motivo -->
  <g stroke="#D4845A" stroke-width="0.4" fill="none" opacity="0.7">
    <line x1="14" y1="62" x2="36" y2="62"/>
    <line x1="14" y1="64" x2="36" y2="64"/>
    <line x1="14" y1="66" x2="36" y2="66"/>
  </g>

  <text x="25" y="78" text-anchor="middle" font-family="Inter, sans-serif" font-weight="800" font-size="4.2" fill="#2D6A4F">CIERVA</text>
  <text x="25" y="84" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="3.4" fill="#1B1B1B">trilineal</text>

  <line x1="18" y1="90" x2="32" y2="90" stroke="#D4845A" stroke-width="0.5"/>

  <text x="25" y="98" text-anchor="middle" font-family="Inter, sans-serif" font-size="2.3" fill="#3D3D3D">Abrigo paleolítico de</text>
  <text x="25" y="102" text-anchor="middle" font-family="Inter, sans-serif" font-size="2.3" fill="#3D3D3D">La Lluera, en San Juan</text>
  <text x="25" y="106" text-anchor="middle" font-family="Inter, sans-serif" font-size="2.3" fill="#3D3D3D">de Priorio, concejo de</text>
  <text x="25" y="110" text-anchor="middle" font-family="Inter, sans-serif" font-size="2.3" fill="#3D3D3D">Oviedo, a orillas del Nalón.</text>

  <text x="25" y="118" text-anchor="middle" font-family="Inter, sans-serif" font-size="2.3" fill="#3D3D3D">Conjunto descubierto en</text>
  <text x="25" y="122" text-anchor="middle" font-family="Inter, sans-serif" font-size="2.3" fill="#3D3D3D">1979 y estudiado por</text>
  <text x="25" y="126" text-anchor="middle" font-family="Inter, sans-serif" font-weight="600" font-size="2.3" fill="#3D3D3D">Javier Fortea Pérez</text>
  <text x="25" y="130" text-anchor="middle" font-family="Inter, sans-serif" font-size="2.3" fill="#3D3D3D">(Universidad de Oviedo).</text>

  <line x1="18" y1="136" x2="32" y2="136" stroke="#E5E5E0" stroke-width="0.4"/>

  <text x="25" y="143" text-anchor="middle" font-family="Inter, sans-serif" font-size="2.2" fill="#3D3D3D">El motivo se caracteriza</text>
  <text x="25" y="147" text-anchor="middle" font-family="Inter, sans-serif" font-size="2.2" fill="#3D3D3D">por un trazo de tres líneas</text>
  <text x="25" y="151" text-anchor="middle" font-family="Inter, sans-serif" font-size="2.2" fill="#3D3D3D">paralelas que da nombre</text>
  <text x="25" y="155" text-anchor="middle" font-family="Inter, sans-serif" font-size="2.2" fill="#3D3D3D">al «trilineal».</text>

  <line x1="18" y1="161" x2="32" y2="161" stroke="#E5E5E0" stroke-width="0.4"/>

  <text x="25" y="169" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="2.3" fill="#2D6A4F">Paleolítico superior asturiano</text>

  <line x1="18" y1="174" x2="32" y2="174" stroke="#E5E5E0" stroke-width="0.4"/>

  <text x="25" y="181" text-anchor="middle" font-family="Inter, sans-serif" font-style="italic" font-size="2.1" fill="#D4845A">Emblema de la exposición.</text>
  <text x="25" y="185" text-anchor="middle" font-family="Inter, sans-serif" font-style="italic" font-size="2.1" fill="#D4845A">Motivo del cartel y el logo.</text>

  <text x="25" y="192" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="2" fill="#2D6A4F">DOMINGO GONZÁLEZ DE LENA</text>
  <text x="25" y="196" text-anchor="middle" font-family="Inter, sans-serif" font-size="1.7" fill="#999" letter-spacing="0.3">paleotxomi.com · @txomidelena</text>
</svg>
