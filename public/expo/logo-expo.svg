<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280" role="img" aria-label="Logo exposición · Domingo González de Lena · arte paleolítico asturiano en piedra">
  <title>Logo de la exposición</title>
  <desc>Logo específico de la exposición en La Esquina del Peso, con motivo de cierva esquemática.</desc>

  <rect width="100%" height="100%" fill="#FAFAF7"/>

  <!-- Cierva a la izquierda -->
  <g transform="translate(40,80)" stroke="#2D6A4F" stroke-width="2.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 50 60 C 100 38, 180 35, 240 50 L 256 58 L 262 48"/>
    <path d="M 50 60 L 35 42 L 26 28 L 22 22"/>
    <path d="M 24 24 L 18 10"/>
    <path d="M 22 22 L 13 28"/>
    <path d="M 58 68 L 58 116"/>
    <path d="M 76 64 L 76 112"/>
    <path d="M 215 64 L 218 116"/>
    <path d="M 240 60 L 246 112"/>
    <path d="M 76 86 L 215 86"/>
  </g>

  <!-- Línea vertical divisora -->
  <line x1="350" y1="80" x2="350" y2="220" stroke="#D4845A" stroke-width="1.5"/>

  <!-- Texto -->
  <text x="368" y="110" font-family="Inter, sans-serif" font-weight="600" font-size="11" fill="#D4845A" letter-spacing="3">EXPOSICIÓN</text>
  <text x="368" y="148" font-family="Inter, sans-serif" font-weight="800" font-size="26" fill="#2D6A4F" letter-spacing="-0.6">DOMINGO</text>
  <text x="368" y="174" font-family="Inter, sans-serif" font-weight="700" font-size="18" fill="#1B1B1B" letter-spacing="-0.3">González de Lena</text>
  <text x="368" y="202" font-family="Inter, sans-serif" font-weight="500" font-size="12" fill="#3D3D3D">Arte paleolítico asturiano en piedra</text>
</svg>
